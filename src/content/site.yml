faq:
  - pregunta: "¿Los cursos son en línea o presenciales?"
    respuesta: "Todos nuestros cursos se imparten en línea en vivo a través de plataformas como Zoom y Meet. Este formato digital garantiza la práctica conversacional en tiempo real que los alumnos necesitan para avanzar de verdad, desde la comodidad de su casa."
  - pregunta: "¿Qué material se necesita para los cursos?"
    respuesta: "¡No necesitas comprar nada extra! Todo el material de estudio te lo proporcionamos nosotros y el profesor a cargo. Para tomar las clases, solo vas a necesitar una computadora con cámara y micrófono, una buena conexión a internet y un cuaderno para tus notas."
  - pregunta: "¿Dónde se pagan los cursos?"
    respuesta: "Los pagos se realizan de forma cómoda y segura mediante transferencia electrónica. Para solicitar los datos bancarios o conocer otros métodos de pago disponibles, contáctanos por WhatsApp o correo electrónico."
  - pregunta: "¿Los cursos tienen constancia oficial?"
    respuesta: "Sí. Al completar cada ciclo, los alumnos reciben una constancia de acreditación. Además, preparamos a los alumnos para obtener certificaciones internacionales Cambridge, Oxford y TOEFL."
  - pregunta: "¿Hay clases para adultos?"
    respuesta: "Sí. Contamos con cursos para adultos (18+) en todas las orientaciones: laboral, conversacional, académica y preparación para exámenes. Los grupos de adultos tienen horarios flexibles, incluyendo horarios nocturnos."
  - pregunta: "¿Cuántos alumnos hay por grupo?"
    respuesta: "Máximo 10 alumnos por grupo. Creemos que los grupos pequeños son la clave del avance real: más tiempo de práctica por alumno, atención personalizada y una dinámica de clase que no se logra en grupos grandes."
  - pregunta: "¿Desde qué edad pueden inscribirse los niños?"
    respuesta: "Contamos con programas diseñados especialmente para niños desde los 4 años, con metodología lúdica y maestros especializados en educación infantil."
  - pregunta: "¿Cómo funciona el programa de intercambio?"
    respuesta: "El programa tiene una duración de 2 semanas en el destino elegido (París o Londres). Incluye vuelos, alojamiento, clases en escuela aliada, excursiones y supervisión completa. Los grupos son pequeños (máximo 15 alumnos) y hay un guía mexicano que acompaña al grupo en todo momento."

nosotros:
  titulo: "Casi 100 años formando bilingües"
  subtitulo: "Una historia de vocación, excelencia y transformación"
  descripcion: "Fundada en 1925, somos una de las escuelas de idiomas con mayor trayectoria en la Ciudad de México. A lo largo de décadas hemos formado generaciones de niños, jóvenes y adultos que encontraron en el lenguaje una puerta al mundo."
  descripcion_2: "Hoy, con casi un siglo de historia, seguimos fieles a nuestra misión: enseñar idiomas con rigor académico internacional, grupos pequeños y una vocación genuina por el desarrollo de cada alumno. No somos una academia masiva. Somos una escuela de verdad."
  imagen: "https://images.unsplash.com/photo-1577896851231-70ef18881754?w=1200"
  mision: "Ofrecer educación lingüística de calidad internacional, accesible para las familias mexicanas, con un enfoque en resultados reales y experiencias transformadoras."
  vision: "Ser la escuela de idiomas de referencia en México, reconocida por la calidad de sus egresados y la profundidad de su impacto en la vida de las familias."
  valores:
    - "Excelencia académica"
    - "Atención personalizada"
    - "Resultados comprobables"
    - "Vocación de servicio"
  acreditaciones:
    - nombre: "Centro de preparación Cambridge"
      descripcion: "Preparamos a nuestros alumnos para los exámenes KET, PET, FCE, CAE y CPE de Cambridge."
    - nombre: "Centro TOEFL autorizado"
      descripcion: "Nuestros alumnos pueden presentar el TOEFL IBT con preparación intensiva."
    - nombre: "Afiliación Oxford"
      descripcion: "Usamos materiales y metodología certificada por Oxford University Press."
  logros:
    - "Más de 10,000 alumnos egresados"
    - "Cerca de 100 años de trayectoria"
    - "3 generaciones de familias que confían en nosotros"
    - "Alumnos en universidades de 12 países"

